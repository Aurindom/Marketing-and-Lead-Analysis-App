# Contact form detection regression samples.
# Run with: LIVE_SAMPLES=1 pytest tests/test_contact_form_samples.py -v
# Do not add to standard CI — each sample makes live HTTP requests.
#
# Before marking verified: true on any entry:
#   1. Load the URL in a browser and confirm the expected_has_form value.
#   2. Confirm where the form lives (homepage vs /contact vs other path).
#   3. Pick stable URLs — long-lived businesses or well-known utilities.
#
# category values: homepage_form | internal_page_form | no_form | js_rendered_form

samples:

  # --- Has form: form tag present on the homepage ---

  - label: "httpbin POST form"
    url: "https://httpbin.org/forms/post"
    category: homepage_form
    expected_has_form: true
    expected_form_page: "homepage"
    verified: true
    notes: "HTTP testing utility. Standard HTML form with submit control. Stable URL."

  # Placeholder: add a real small business site where the contact form embeds
