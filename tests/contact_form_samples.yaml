  # --- No form: site has no contact form anywhere ---

  - label: "example.com - IANA placeholder"
    url: "https://example.com"
    category: no_form
    expected_has_form: false
    expected_form_page: null
    verified: true
    notes: "Standard IANA placeholder page. No form, no links, no content."

  - label: "Wikipedia - Dentist article"
    url: "https://en.wikipedia.org/wiki/Dentist"
    category: no_form
    expected_has_form: false
    expected_form_page: null
    verified: true
    notes: "Informational article. No business contact form. Tests that content-rich pages without forms score correctly."
